{% extends "campaigns/manage/base.html" %}

{% block title %}Login — Leafletter Manager{% endblock %}

{% block content %}
<h1>Sign In</h1>

<div class="card" style="max-width: 400px;">
  {% if login_error %}
    <ul class="messages" style="margin-bottom: 16px;">
      <li class="error">Invalid username or password.</li>
    </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div style="margin-bottom: 14px;">
      <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:4px;">Username</label>
      <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username"
             style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem;">
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:4px;">Password</label>
      <input type="password" name="password" autocomplete="current-password"
             style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem;">
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
  </form>
</div>
{% endblock %}
