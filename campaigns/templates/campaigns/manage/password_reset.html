{% extends "campaigns/manage/base.html" %}

{% block title %}Password Reset — Leafletter Manager{% endblock %}

{% block content %}
<h1>Reset Password</h1>

<div class="card" style="max-width: 400px;">
  <p style="margin-bottom: 16px; color: #555; font-size: 0.95rem;">
    Enter your email address and we'll send you a link to reset your password.
  </p>

  <form method="post">
    {% csrf_token %}

    <div style="margin-bottom: 20px;">
      <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:4px;">Email Address</label>
      <input type="email" name="email" autofocus autocomplete="email"
             style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:0.95rem;"
             placeholder="you@example.com">
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
  </form>
</div>

<p style="max-width: 400px; margin-top: 16px;">
  <a href="/manage/login/" style="color: #1a6b3c; font-size: 0.9rem;">Back to Sign In</a>
</p>
{% endblock %}
