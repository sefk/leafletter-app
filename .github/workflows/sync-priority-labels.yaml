name: Sync Priority Labels to Project

on:
  issues:
    types: [opened, labeled, unlabeled]
  pull_request:
    types: [opened, labeled, unlabeled]

jobs:
  sync-priority:
    runs-on: ubuntu-latest
    steps:
      - name: Sync priority label to project field
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            const labels = issue.labels.map(l => l.name);
            
            // Determine priority from labels
            let priority = null;
            if (labels.includes('P0')) {
              priority = 'P0';
            } else if (labels.includes('P1')) {
              priority = 'P1';
            } else if (labels.includes('P2')) {
              priority = 'P2';
            }
            
            const owner = context.repo.owner;
            
            // Get the project ID using GraphQL - query the viewer's projects
            const projectQuery = `
              query {
                viewer {
                  projectV2(number: 1) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const projectResult = await github.graphql(projectQuery);
            const project = projectResult.viewer.projectV2;
            
            if (!project) {
              core.setFailed('Could not find project 1');
              return;
            }
            
            // Find the Priority field
            const priorityField = project.fields.nodes.find(f => f.name === 'Priority');
            if (!priorityField) {
              core.setFailed('Could not find Priority field in project');
              return;
            }
            
            // Get the field options to find the correct option ID
            const fieldQuery = `
              query {
                viewer {
                  projectV2(number: 1) {
                    field(name: "Priority") {
                      ... on ProjectV2SingleSelectField {
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const fieldResult = await github.graphql(fieldQuery);
            const field = fieldResult.viewer.projectV2.field;
            
            let optionId = null;
            if (priority) {
              const option = field.options.find(o => o.name === priority);
              if (option) {
                optionId = option.id;
              } else {
                core.warning(`Could not find option ${priority} in Priority field`);
                return;
              }
            }
            
            // Get the item ID in the project
            const itemQuery = `
              query {
                viewer {
                  projectV2(number: 1) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository {
                              nameWithOwner
                            }
                          }
                          ... on PullRequest {
                            number
                            repository {
                              nameWithOwner
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const itemResult = await github.graphql(itemQuery);
            const projectItem = itemResult.viewer.projectV2.items.nodes.find(
              item => item.content.number === issue.number && 
                       item.content.repository.nameWithOwner === context.repo.owner + '/' + context.repo.repo
            );
            
            if (!projectItem) {
              core.info(`Issue #${issue.number} not found in project`);
              return;
            }
            
            // Update the field value
            if (optionId) {
              const updateQuery = `
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}"
                    itemId: "${projectItem.id}"
                    fieldId: "${priorityField.id}"
                    value: {singleSelectOptionId: "${optionId}"}
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;
              
              await github.graphql(updateQuery);
              core.info(`Updated priority to ${priority} for issue #${issue.number}`);
            } else {
              // Clear the priority if no priority label is set
              const clearQuery = `
                mutation {
                  clearProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}"
                    itemId: "${projectItem.id}"
                    fieldId: "${priorityField.id}"
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;
              
              await github.graphql(clearQuery);
              core.info(`Cleared priority for issue #${issue.number}`);
            }
