name: Add Issue to Project Board

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to Leafletter dev project board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECT_PAT }}
          script: |
            // Get the project node ID
            const projectQuery = `
              query {
                user(login: "sefk") {
                  projectV2(number: 1) {
                    id
                  }
                }
              }
            `;

            const projectResult = await github.graphql(projectQuery);
            const projectId = projectResult.user.projectV2.id;

            if (!projectId) {
              core.setFailed('Could not find project 1');
              return;
            }

            // Add the issue to the project
            const addMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }
            `;

            const contentId = context.payload.issue.node_id;

            try {
              const result = await github.graphql(addMutation, {
                projectId: projectId,
                contentId: contentId,
              });
              core.info(`Added issue #${context.payload.issue.number} to project board (item id: ${result.addProjectV2ItemById.item.id})`);
            } catch (e) {
              // addProjectV2ItemById is idempotent — duplicate items are silently ignored
              // by GitHub's API, but log just in case something else goes wrong
              core.warning(`Could not add issue to project: ${e.message}`);
            }
